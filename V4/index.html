<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <!-- Garante responsividade no mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V██4.exe</title>
  <!-- Fonte customizada e CSS -->
  <link rel="stylesheet" type="text/css" href="styles.css" media="screen" />
</head>
<body>
  <div class="container">
    <!-- Vídeo de fundo -->
    <video autoplay muted loop id="video-bg">
      <source src="../Assets/Imgs/video.mp4" type="video/mp4">
      Seu navegador não suporta vídeos em HTML5.
    </video>
    
    <!-- ============================= -->
    <!-- Tela Inicial (Menu Principal) -->
    <!-- ============================= -->
    <div id="start-screen" class="screen visible">
      <a href="../SG_V/index.html" class="back-button">Voltar</a>
      <h1 id="start-screen-title">
        INICIALIZANDO...<br>
        ERRO V██4.exe<br>
        TESTE Nº███ INICIADO....
      </h1>
      <div class="buttons-container">
        <button id="Facil">Securus</button>
        <button id="Medio">Mediocris</button>
        <button id="Dificil">Arduus</button>
      </div>
    </div>

    <!-- ========================== -->
    <!-- Telas de "flash" das cores -->
    <!-- ========================== -->
    <!-- FÁCIL -->
    <div id="game-screen-facil" class="screen">
      <h2>Jogo em andamento (Fácil)...</h2>
      <div id="color-flash-facil" class="color-flash"></div>
    </div>
    <!-- MÉDIO -->
    <div id="game-screen-medio" class="screen">
      <h2>Jogo em andamento (Médio)...</h2>
      <div id="color-flash-medio" class="color-flash"></div>
    </div>
    <!-- DIFÍCIL -->
    <div id="game-screen-dificil" class="screen">
      <h2>Jogo em andamento (Difícil)...</h2>
      <div id="color-flash-dificil" class="color-flash"></div>
    </div>

    <!-- ============================================ -->
    <!-- Telas de seleção de cores (após o flash) -->
    <!-- ============================================ -->
    <!-- FÁCIL -->
    <div id="game-screen-facil2" class="screen2">
      <div class="buttons-container2">
        <button class="color-button" id="Roxo"     value="#B026FF">Roxo</button>
        <button class="color-button" id="Vermelho" value="#FF073A">Vermelho</button>
        <button class="color-button" id="Azul"     value="#1F51FF">Azul</button>
        <button class="color-button" id="Verde"    value="#39FF14">Verde</button>
        <button class="color-button" id="Amarelo"  value="#FFFF33">Amarelo</button>
      </div>
    </div>
    <!-- MÉDIO -->
    <div id="game-screen-medio2" class="screen2">
      <div class="buttons-container2">
        <button class="color-button" id="Roxo"     value="#B026FF">Roxo</button>
        <button class="color-button" id="Vermelho" value="#FF073A">Vermelho</button>
        <button class="color-button" id="Azul"     value="#1F51FF">Azul</button>
        <button class="color-button" id="Verde"    value="#39FF14">Verde</button>
        <button class="color-button" id="Amarelo"  value="#FFFF33">Amarelo</button>
      </div>
    </div>
    <!-- DIFÍCIL -->
    <div id="game-screen-dificil2" class="screen2">
      <div class="buttons-container2">
        <button class="color-button" id="Roxo"     value="#B026FF">Roxo</button>
        <button class="color-button" id="Vermelho" value="#FF073A">Vermelho</button>
        <button class="color-button" id="Azul"     value="#1F51FF">Azul</button>
        <button class="color-button" id="Verde"    value="#39FF14">Verde</button>
        <button class="color-button" id="Amarelo"  value="#FFFF33">Amarelo</button>
      </div>
    </div>
  </div>

  <!-- =============== -->
  <!-- Tela de Vitória -->
  <!-- =============== -->
  <div id="win-screen" class="win-screen">
    <div class="win-box">
      <div class="win-header">
        <span class="win-title">V██2.exe - Error</span>
        <span class="win-close" id="win-close">✖</span>
      </div>
      <div class="win-content">
        <img src="../Assets/Imgs/Smile.png" alt="Smiley">
        <p class="win-message">Parabéns! Você completou o jogo com sucesso!</p>
        <button id="win-ok" class="win-button">OK</button>
      </div>
    </div>
  </div>

  <!-- =============== -->
  <!-- Tela de Derrota -->
  <!-- =============== -->
  <div id="def-screen" class="def-screen">
    <div class="def-box">
      <div class="def-header">
        <span class="def-title">V██2.exe - Error</span>
        <span class="def-close" id="def-close">✖</span>
      </div>
      <div class="def-content">
        <img src="../Assets/Imgs/angry.png" alt="Angry">
        <p class="def-message">Parabéns! Você fracassou de forma esplêndida!</p>
        <button id="def-ok" class="win-button">OK</button>
      </div>
    </div>
  </div>

  <!-- Arquivo JS com lógica do jogo -->
  <script src="script.js"></script>
</body>
</html>
